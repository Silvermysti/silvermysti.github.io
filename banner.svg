<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="'DM Mono', ui-monospace, monospace">
  <defs>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8809c"/>
      <stop offset="100%" stop-color="#c66f93"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8809c"/>
      <stop offset="100%" stop-color="#a05068"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="0" y="0" width="1200" height="320" rx="16" fill="#1a1c22"/>
  <rect x="0.5" y="0.5" width="1199" height="319" rx="16" fill="none" stroke="#222430"/>

  <!-- titlebar -->
  <rect x="0" y="0" width="1200" height="48" rx="16" fill="#14161c"/>
  <rect x="0" y="32" width="1200" height="16" fill="#14161c"/>
  <line x1="0" y1="48" x2="1200" y2="48" stroke="#222430"/>
  <circle cx="28" cy="24" r="6" fill="#e87070"/>
  <circle cx="50" cy="24" r="6" fill="#e8c050"/>
  <circle cx="72" cy="24" r="6" fill="#60c060"/>
  <text x="110" y="29" fill="#505468" font-size="14" letter-spacing="1">breeti-bandyopadhyay.dev</text>

  <!-- monogram -->
  <rect x="56" y="104" width="64" height="64" rx="14" fill="url(#mono)"/>
  <text x="88" y="148" fill="#14161c" font-size="28" font-weight="500" text-anchor="middle">BB</text>

  <!-- name -->
  <text x="148" y="135" fill="#eceaf4" font-size="40" font-weight="500" font-family="'DM Sans', sans-serif">Breeti <tspan fill="url(#nameGrad)">Bandyopadhyay</tspan></text>
  <text x="150" y="166" fill="#9094a8" font-size="16">$ cse @ shiv nadar university · researcher · builder</text>

  <!-- prompt line -->
  <text x="56" y="224" fill="#a05068" font-size="15">breeti@portfolio:~$</text>
  <text x="232" y="224" fill="#b8bcd0" font-size="15">cat about.md</text>

  <!-- tags -->
  <g font-size="13" fill="#b0b4c8">
    <rect x="56" y="246" width="92" height="26" rx="5" fill="#1a1c22" stroke="#2e3040"/>
    <text x="102" y="263" text-anchor="middle">Machine Learning</text>
    <rect x="158" y="246" width="116" height="26" rx="5" fill="#1a1c22" stroke="#2e3040"/>
    <text x="216" y="263" text-anchor="middle">Computer Vision</text>
    <rect x="284" y="246" width="78" height="26" rx="5" fill="#1a1c22" stroke="#2e3040"/>
    <text x="323" y="263" text-anchor="middle">Research</text>
    <rect x="372" y="246" width="118" height="26" rx="5" fill="#1e1428" stroke="#a05068"/>
    <text x="431" y="263" text-anchor="middle" fill="#e8809c">Published · IF 8.3</text>
  </g>

  <!-- blinking cursor block -->
  <rect x="352" y="213" width="9" height="15" fill="#e8809c">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- decorative right-side faded code -->
  <g fill="#222430" font-size="13" opacity="0.9">
    <text x="900" y="110">{</text>
    <text x="920" y="134">"role": "cse_undergrad",</text>
    <text x="920" y="158">"cgpa": 9.32,</text>
    <text x="920" y="182">"status": "open",</text>
    <text x="920" y="206">"repos": 8</text>
    <text x="900" y="230">}</text>
  </g>
</svg>
